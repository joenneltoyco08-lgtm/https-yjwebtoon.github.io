        /* Style for individual comic panels */
        .panel {

            width: 100%;

            /* Optional: add some spacing between panels if the images are individual panels, not a single long strip */
            /* margin-bottom: 5px; */ 
        }
        /* Style for navigation */
        .navigation {
            text-align: center;
            padding: 20px;
        }
        .navigation a {
            margin: 0 10px;
            text-decoration: none;
            color: #007bff;
            font-size: 18px;
        }
    </style>
</head>
